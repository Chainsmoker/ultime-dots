# GENERADO POR MATUGEN — no editar a mano, se sobrescribe.
general {
    # active = primary (accent) bien visible
    # inactive = outline (gris-warm) más sutil pero perceptible
    col.active_border   = rgba({{colors.primary.default.hex_stripped}}DD)
    col.inactive_border = rgba({{colors.outline.default.hex_stripped}}55)
}

misc {
    background_color = rgba({{colors.surface.dark.hex_stripped}}FF)
}
