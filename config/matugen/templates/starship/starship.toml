# GENERADO POR MATUGEN — no editar a mano (se regenera con `wall`).
# Editá el template: ~/.config/matugen/templates/starship/starship.toml
#
# Diseño "new-starship": prompt de DOS líneas. Línea 1 = pills powerline
# (cmd_duration · directory · git_branch); línea 2 = el caret. Los grises ANSI
# del diseño original se mapean a roles de la paleta matugen (ver [palettes]).
# Los glifos nerd/powerline vienen del archivo fuente (PUA byte-correcta).

add_newline = true
palette = "matugen"
# Pipes ╰─ ╭─
# Powerline symbols                                     
# Wedges 🭧🭒 🭣🭧🭓
# Random noise 🬖🬥🬔🬗
# Cool stuff 󰜥   

# format = """
# $directory $fill $git_branch $cmd_duration
#  $character"""
format = """
$cmd_duration $directory$git_branch
  $character"""

[palettes.matugen]
# Pills de la línea 1 + caret, cada uno a un rol Material You del wallpaper.
cmd_bg   = "{{colors.surface_container_high.default.hex}}"
cmd_fg   = "{{colors.on_surface.default.hex}}"
dir_bg   = "{{colors.primary.default.hex}}"
dir_fg   = "{{colors.on_primary.default.hex}}"
git_bg   = "{{colors.secondary_container.default.hex}}"
git_fg   = "{{colors.on_secondary_container.default.hex}}"
stat_bg  = "{{colors.tertiary_container.default.hex}}"
stat_fg  = "{{colors.on_tertiary_container.default.hex}}"
char_ok  = "{{colors.primary.default.hex}}"
char_err = "{{colors.error.default.hex}}"
fill_fg  = "{{colors.outline.default.hex}}"

[fill]
symbol = '-'
style = 'fg:fill_fg'

# Replace the "❯" symbol in the prompt with "➜"
[character]                            # The name of the module we are configuring is "character"
success_symbol = "[ ](bold fg:char_ok)"
error_symbol = "[ ](bold fg:char_err)"

# Disable the package module, hiding it from the prompt completely
[package]
disabled = true

[git_branch]
style = "bg:git_bg"
symbol = "󰘬"
truncation_length = 12
truncation_symbol = ""
format = " 󰜥 [](bold fg:git_bg)[$symbol $branch(:$remote_branch)](fg:git_fg bg:git_bg)[ ](bold fg:git_bg)"

[git_commit]
commit_hash_length = 4
tag_symbol = " "

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = "[🍒 PICKING](bold red)"

[git_status]
conflicted = " 🏳 "
ahead = " 🏎💨 "
behind = " 😰 "
diverged = " 😵 "
untracked = " 🤷 ‍"
stashed = " 📦 "
modified = " 📝 "
staged = '[++\($count\)](green)'
renamed = " ✍️ "
deleted = " 🗑 "

[hostname]
ssh_only = false
format =  "[•$hostname](bg:cmd_bg bold fg:cmd_fg)[](bold fg:cmd_bg)"
trim_at = ".companyname.com"
disabled = false

[line_break]
disabled = false

[memory_usage]
disabled = true
threshold = -1
symbol = " "
style = "bold dimmed green"

[time]
disabled = true
format = '🕙[\[ $time \]]($style) '
time_format = "%T"

[username]
style_user = "bold bg:cmd_bg fg:cmd_fg"
style_root = "red bold"
format = "[](bold fg:cmd_bg)[$user]($style)"
disabled = false
show_always = true

[directory]
home_symbol = " "
read_only = "  "
style = "bg:dir_bg fg:dir_fg"
truncation_length = 2
truncation_symbol = ".../"
format = '[](bold fg:dir_bg)[󰉋 → $path]($style)[](bold fg:dir_bg)'


[directory.substitutions]
"Desktop" = "  "
"Documents" = "  "
"Downloads" = "  "
"Music" = " 󰎈 "
"Pictures" = "  "
"Videos" = "  "
"GitHub" = " 󰊤 "

[cmd_duration]
min_time = 0
format = '[](bold fg:cmd_bg)[󰪢 $duration](bold bg:cmd_bg fg:cmd_fg)[](bold fg:cmd_bg)'
