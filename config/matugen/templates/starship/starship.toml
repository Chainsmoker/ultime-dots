# GENERADO POR MATUGEN — no editar a mano (se regenera con `wall`).
# Editá el template: ~/.config/matugen/templates/starship/starship.toml
#
# Tema "pills" powerline (el de antes) en UNA sola línea, recoloreado con la
# paleta del wallpaper. Los glifos nerd/powerline se inyectan desde el generador
# (bin) como escapes \u porque la PUA se corrompe al editar el archivo a mano.

add_newline = false
palette = "matugen"
# El `format` de raíz DEBE ir antes de cualquier [tabla]; si va después de
# [palettes.matugen], TOML lo mete en esa tabla y starship usa su layout default.
format = "$cmd_duration $directory$git_branch$git_status $character"

[palettes.matugen]
cmd_bg   = "{{colors.surface_container_high.default.hex}}"
cmd_fg   = "{{colors.on_surface.default.hex}}"
dir_bg   = "{{colors.primary.default.hex}}"
dir_fg   = "{{colors.on_primary.default.hex}}"
git_bg   = "{{colors.secondary_container.default.hex}}"
git_fg   = "{{colors.on_secondary_container.default.hex}}"
stat_bg  = "{{colors.tertiary_container.default.hex}}"
stat_fg  = "{{colors.on_tertiary_container.default.hex}}"
char_ok  = "{{colors.primary.default.hex}}"
char_err = "{{colors.error.default.hex}}"

[cmd_duration]
min_time = 0
format = '[](fg:cmd_bg)[󰪢 $duration](bg:cmd_bg fg:cmd_fg bold)[](fg:cmd_bg)'

[directory]
home_symbol = "󰑭 "
read_only = " 󰑖"
read_only_style = "bg:char_err fg:dir_fg bold"
truncation_length = 2
truncation_symbol = ".../"
format = '[](fg:dir_bg)[󰉋 → $path](bg:dir_bg fg:dir_fg bold)[](fg:dir_bg)'

[git_branch]
symbol = "󰘬"
truncation_length = 12
truncation_symbol = "…"
format = ' 󰜥 [](fg:git_bg)[$symbol $branch(:$remote_branch)](fg:git_fg bg:git_bg bold)[](fg:git_bg)'

[git_status]
format = '( [](fg:stat_bg)[$all_status$ahead_behind](bg:stat_bg fg:stat_fg bold)[](fg:stat_bg))'
conflicted = "✕"
ahead = "↑${count}"
behind = "↓${count}"
diverged = "↕"
up_to_date = ""
untracked = "?${count}"
stashed = "≡${count}"
modified = "•${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[character]
success_symbol = "[❯](bold fg:char_ok)"
error_symbol = "[❯](bold fg:char_err)"

[package]
disabled = true
