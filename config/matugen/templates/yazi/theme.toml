# Generado por matugen — NO editar a mano (overwrite en cada `wall`).
# Para overrides custom usar un theme.toml separado o yazi-override.

[mgr]
cwd = { fg = "{{colors.primary.default.hex}}" }
hovered         = { fg = "{{colors.on_primary.default.hex}}", bg = "{{colors.primary.default.hex}}" }
preview_hovered = { underline = true }

find_keyword  = { fg = "{{colors.tertiary.default.hex}}", italic = true }
find_position = { fg = "{{colors.error.default.hex}}", bg = "reset", italic = true }

marker_copied   = { fg = "{{colors.primary.default.hex}}",   bg = "{{colors.primary.default.hex}}" }
marker_cut      = { fg = "{{colors.error.default.hex}}",     bg = "{{colors.error.default.hex}}" }
marker_marked   = { fg = "{{colors.tertiary.default.hex}}",  bg = "{{colors.tertiary.default.hex}}" }
marker_selected = { fg = "{{colors.secondary.default.hex}}", bg = "{{colors.secondary.default.hex}}" }

tab_active   = { fg = "{{colors.on_primary.default.hex}}",        bg = "{{colors.primary.default.hex}}" }
tab_inactive = { fg = "{{colors.on_surface.default.hex}}",        bg = "{{colors.surface_variant.default.hex}}" }
tab_width    = 1

count_copied   = { fg = "{{colors.on_primary.default.hex}}",   bg = "{{colors.primary.default.hex}}" }
count_cut      = { fg = "{{colors.on_error.default.hex}}",     bg = "{{colors.error.default.hex}}" }
count_selected = { fg = "{{colors.on_secondary.default.hex}}", bg = "{{colors.secondary.default.hex}}" }

border_symbol = "│"
border_style  = { fg = "{{colors.outline.default.hex}}" }

syntect_theme = ""

[mode]
normal_main = { fg = "{{colors.on_primary.default.hex}}",   bg = "{{colors.primary.default.hex}}",   bold = true }
normal_alt  = { fg = "{{colors.primary.default.hex}}",      bg = "{{colors.surface_variant.default.hex}}" }
select_main = { fg = "{{colors.on_secondary.default.hex}}", bg = "{{colors.secondary.default.hex}}", bold = true }
select_alt  = { fg = "{{colors.secondary.default.hex}}",    bg = "{{colors.surface_variant.default.hex}}" }
unset_main  = { fg = "{{colors.on_tertiary.default.hex}}",  bg = "{{colors.tertiary.default.hex}}",  bold = true }
unset_alt   = { fg = "{{colors.tertiary.default.hex}}",     bg = "{{colors.surface_variant.default.hex}}" }

[status]
separator_open  = ""
separator_close = ""
separator_style = { fg = "{{colors.surface_variant.default.hex}}", bg = "{{colors.surface_variant.default.hex}}" }

perm_type    = { fg = "{{colors.primary.default.hex}}"   }
perm_read    = { fg = "{{colors.tertiary.default.hex}}"  }
perm_write   = { fg = "{{colors.error.default.hex}}"     }
perm_exec    = { fg = "{{colors.secondary.default.hex}}" }
perm_sep     = { fg = "{{colors.outline.default.hex}}"   }

progress_label  = { fg = "{{colors.on_surface.default.hex}}", bold = true }
progress_normal = { fg = "{{colors.primary.default.hex}}",    bg = "{{colors.surface_variant.default.hex}}" }
progress_error  = { fg = "{{colors.error.default.hex}}",      bg = "{{colors.surface_variant.default.hex}}" }

[input]
border   = { fg = "{{colors.primary.default.hex}}" }
title    = {}
value    = {}
selected = { reversed = true }

[confirm]
border  = { fg = "{{colors.primary.default.hex}}" }
title   = { fg = "{{colors.primary.default.hex}}" }
content = {}
list    = {}
btn_yes = { reversed = true }
btn_no  = {}

[pick]
border   = { fg = "{{colors.primary.default.hex}}" }
active   = { fg = "{{colors.secondary.default.hex}}", bold = true }
inactive = {}

[completion]
border   = { fg = "{{colors.primary.default.hex}}" }
active   = { bg = "{{colors.surface_variant.default.hex}}" }
inactive = {}

[help]
on      = { fg = "{{colors.secondary.default.hex}}" }
run     = { fg = "{{colors.primary.default.hex}}" }
desc    = { fg = "{{colors.tertiary.default.hex}}" }
hovered = { bg = "{{colors.surface_variant.default.hex}}", bold = true }
footer  = { fg = "{{colors.on_surface.default.hex}}", bg = "{{colors.surface_variant.default.hex}}" }

[notify]
title_info  = { fg = "{{colors.primary.default.hex}}" }
title_warn  = { fg = "{{colors.tertiary.default.hex}}" }
title_error = { fg = "{{colors.error.default.hex}}" }

[filetype]
rules = [
    # Imagen
    { mime = "image/*", fg = "{{colors.secondary.default.hex}}" },
    # Video
    { mime = "video/*", fg = "{{colors.tertiary.default.hex}}" },
    # Audio
    { mime = "audio/*", fg = "{{colors.tertiary.default.hex}}" },
    # Archivos comprimidos
    { mime = "application/zip",       fg = "{{colors.error.default.hex}}" },
    { mime = "application/gzip",      fg = "{{colors.error.default.hex}}" },
    { mime = "application/x-tar",     fg = "{{colors.error.default.hex}}" },
    { mime = "application/x-bzip",    fg = "{{colors.error.default.hex}}" },
    { mime = "application/x-bzip2",   fg = "{{colors.error.default.hex}}" },
    { mime = "application/x-7z-compressed", fg = "{{colors.error.default.hex}}" },
    { mime = "application/x-rar",     fg = "{{colors.error.default.hex}}" },
    # Documentos
    { mime = "application/doc",   fg = "{{colors.primary.default.hex}}" },
    { mime = "application/pdf",   fg = "{{colors.primary.default.hex}}" },
    # Fallbacks
    { mime = "text/*",        fg = "{{colors.on_surface.default.hex}}" },
    { mime = "application/*", fg = "{{colors.on_surface.default.hex}}" },
    # Directorios (las rules de filetype necesitan url o mime — para dirs
    # yazi maneja el color via `[mgr].cwd`/`hovered`, no por filetype rule).
]
