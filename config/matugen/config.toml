[config]
version_check = false

# === Cursor (accent para recolorear Bibata via bin/cursor-matugen) ===
# post_hook corre en CUALQUIER run de matugen (Ambxst, bin/wall, color picker),
# detached para no frenar el cambio de wallpaper.
[templates.cursor-accent]
input_path = '~/.config/matugen/templates/cursor/accent'
output_path = '~/.cache/matugen/cursor-accent'
post_hook = 'setsid -f $HOME/.local/bin/cursor-matugen >/dev/null 2>&1'

# === Hyprland (formato .conf — usamos .conf, no .lua) ===
[templates.hyprland]
input_path = '~/.config/matugen/templates/hyprland/colors.conf'
output_path = '~/.config/hypr/colors.conf'

[templates.hyprlock]
input_path = '~/.config/matugen/templates/hyprland/hyprlock-colors.conf'
output_path = '~/.config/hypr/hyprlock/colors.conf'

# === Apps que usan archivo de colores directo ===
[templates.kitty]
input_path = '~/.config/matugen/templates/kitty/colors.conf'
output_path = '~/.config/kitty/colors.conf'

[templates.fuzzel]
input_path = '~/.config/matugen/templates/fuzzel/fuzzel_theme.ini'
output_path = '~/.config/fuzzel/fuzzel_theme.ini'

[templates.gtk3]
input_path = '~/.config/matugen/templates/gtk-3.0/gtk.css'
output_path = '~/.config/gtk-3.0/gtk.css'

[templates.gtk4]
input_path = '~/.config/matugen/templates/gtk-4.0/gtk.css'
output_path = '~/.config/gtk-4.0/gtk.css'

[templates.yazi]
input_path = '~/.config/matugen/templates/yazi/theme.toml'
output_path = '~/.config/yazi/theme.toml'

[templates.fzf]
input_path = '~/.config/matugen/templates/fzf/colors.zsh'
output_path = '~/.cache/matugen/fzf-colors.zsh'

[templates.helix]
input_path = '~/.config/matugen/templates/helix/theme.toml'
output_path = '~/.config/helix/themes/matugen.toml'

# Prompt de zsh (starship). starship no soporta `include`, así que generamos el
# starship.toml entero desde el template → el prompt se recolorea con el wallpaper.
[templates.starship]
input_path = '~/.config/matugen/templates/starship/starship.toml'
output_path = '~/.config/starship.toml'

# Satty (anotador de capturas). Satty hardcodea sus barras a negro y NO usa el
# tema GTK; sí lee ~/.config/satty/overrides.css, que reescribimos aquí.
[templates.satty]
input_path = '~/.config/matugen/templates/satty/overrides.css'
output_path = '~/.config/satty/overrides.css'

# === Qt apps (vía kde-material-you-colors) ===
# Escribe el source color a un archivo que `bin/wall` lee para invocar
# `kde-material-you-colors`, que regenera el color scheme KDE (kdeglobals).
# qt6ct.conf usa `style=Breeze` + `custom_palette=false` → cualquier app Qt
# (qbittorrent, etc.) hereda los colores matugen via KDEPlasmaPlatformTheme6.
# El FileChooser ya no es Qt (cambiamos a termfilechooser+yazi) pero esto
# beneficia a todas las otras apps Qt nativas.
[templates.kde-source-color]
input_path = '~/.config/matugen/templates/kde/color.txt'
output_path = '~/.cache/matugen/source-color.txt'
