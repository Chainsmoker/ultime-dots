# =====================================================================
# Hyprland config — inspirado en end-4/dots-hyprland, adaptado para Ambxst
# Atribución: https://github.com/end-4/dots-hyprland (curves, decoration, animations)
# =====================================================================

# === Monitors ===
monitor = , preferred, auto, 1

# === Variables editables ===
$mod      = SUPER
$terminal = kitty
$browser  = brave
$files    = nautilus
$editor   = code
$launcher = fuzzel

# =====================================================================
# Environment
# =====================================================================
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
# Cursor recoloreado con matugen (lo genera bin/cursor-matugen en cada wallpaper)
env = XCURSOR_THEME,Bibata-Matugen
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = MOZ_ENABLE_WAYLAND,1
env = GDK_BACKEND,wayland,x11
env = SDL_VIDEODRIVER,wayland
env = _JAVA_AWT_WM_NONREPARENTING,1
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# =====================================================================
# Autostart
# =====================================================================
exec-once = /usr/lib/xfce-polkit/xfce-polkit
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
# Activa graphical-session.target (vía BindsTo) para que xdg-desktop-portal-gnome
# y otros servicios con Requisite=graphical-session.target puedan arrancar.
exec-once = systemctl --user start hyprland-session.target
exec-once = gnome-keyring-daemon --start --components=secrets
# Historial de portapapeles: requiere `cliphist` (no instalado). Para habilitar:
#   pacman -S cliphist  →  descomentar estas 2 líneas y el bind SUPER+V de abajo.
# exec-once = wl-paste --type text --watch cliphist store
# exec-once = wl-paste --type image --watch cliphist store
exec-once = nm-applet --indicator
exec-once = blueman-applet
# axctl daemon NO se arranca acá: Ambxst lo spawnea internamente
# (AxctlService.qml:160). Tener dos daemons compitiendo por el socket
# rompe el subscribe → widgets dejan de responder.
exec-once = ambxst
# El picker (termfilechooser → yazi-portal-wrapper) ya abre flotante porque
# usa `hyprctl dispatch exec [float;size;center;opacity]` — no necesita daemon.

# =====================================================================
# General — gaps + bordes (end-4)
# =====================================================================
general {
    gaps_in = 4
    gaps_out = 5
    gaps_workspaces = 50

    border_size = 2
    # Defaults — luego matugen los overridea con colores del wallpaper (al final)
    col.active_border   = rgba(0DB7D4AA)
    col.inactive_border = rgba(31313666)

    resize_on_border = true
    no_focus_fallback = true
    allow_tearing = true
    layout = dwindle

    snap {
        enabled = true
        window_gap = 4
        monitor_gap = 5
        respect_gaps = true
    }
}

# === Colores generados por matugen (override después de general {}) ===
# Se regenera al correr: matugen image <wallpaper>
source = ~/.config/hypr/colors.conf

# =====================================================================
# Decoration — blur fuerte, sombras, dim_inactive (end-4)
# =====================================================================
decoration {
    rounding = 18
    rounding_power = 2.5

    blur {
        enabled = true
        xray = true
        special = false
        new_optimizations = true
        size = 10
        passes = 3
        brightness = 1
        noise = 0.05
        contrast = 0.89
        vibrancy = 0.5
        vibrancy_darkness = 0.5
        popups = false
        popups_ignorealpha = 0.6
        input_methods = true
        input_methods_ignorealpha = 0.8
    }

    shadow {
        enabled = true
        range = 20
        offset = 0 2
        render_power = 10
        color = rgba(00000020)
    }

    dim_inactive = true
    dim_strength = 0.05
    dim_special = 0.2
}

# =====================================================================
# Window rules
# =====================================================================
# Nota: Hyprland 0.55.2 tiene una regresión donde los `windowrule` no se
# aplican a varios windows nuevos (issue #12808). Por eso el FileChooser
# de termfilechooser (kitty + yazi) usa `hyprctl dispatch exec [rules]`
# inline desde `bin/yazi-portal-wrapper` en vez de windowrules acá.
# (no rules acá actualmente — kitty del picker abre via exec [rules].)

# =====================================================================
# Animation curves (end-4 — Material style)
# =====================================================================
bezier = expressiveFastSpatial,    0.42, 1.67, 0.21, 0.90
bezier = expressiveSlowSpatial,    0.39, 1.29, 0.35, 0.98
bezier = expressiveDefaultSpatial, 0.38, 1.21, 0.22, 1.00
bezier = emphasizedDecel,          0.05, 0.7,  0.1,  1.0
bezier = emphasizedAccel,          0.3,  0.0,  0.8,  0.15
bezier = standardDecel,            0.0,  0.0,  0.0,  1.0
bezier = menu_decel,               0.1,  1.0,  0.0,  1.0
bezier = menu_accel,               0.52, 0.03, 0.72, 0.08
bezier = stall,                    1.0, -0.1,  0.7,  0.85

animations {
    enabled = true

    animation = windowsIn,           1, 3,   emphasizedDecel, popin 80%
    animation = windowsOut,          1, 2,   emphasizedDecel, popin 90%
    animation = windowsMove,         1, 3,   emphasizedDecel, slide
    animation = fadeIn,              1, 3,   emphasizedDecel
    animation = fadeOut,             1, 2,   emphasizedDecel
    animation = border,              1, 10,  emphasizedDecel
    animation = layersIn,            1, 2.7, emphasizedDecel, popin 93%
    animation = layersOut,           1, 2.4, menu_accel,      popin 94%
    animation = fadeLayersIn,        1, 0.5, menu_decel
    animation = fadeLayersOut,       1, 2.7, stall
    animation = workspaces,          1, 7,   menu_decel,      slide
    animation = specialWorkspaceIn,  1, 2.8, emphasizedDecel, slidevert
    animation = specialWorkspaceOut, 1, 1.2, emphasizedAccel, slidevert
    animation = zoomFactor,          1, 3,   standardDecel
}

# =====================================================================
# Dwindle layout
# =====================================================================
dwindle {
    preserve_split = true
    smart_split = false
    smart_resizing = false
}

# =====================================================================
# Input + touchpad (end-4)
# =====================================================================
input {
    kb_layout = us
    numlock_by_default = true
    repeat_delay = 250
    repeat_rate = 35
    follow_mouse = 1
    off_window_axis_events = 2

    touchpad {
        natural_scroll = true
        disable_while_typing = true
        clickfinger_behavior = true
        scroll_factor = 0.7
    }
}

# =====================================================================
# Gestures (end-4)
# =====================================================================
# Sintaxis nueva (0.49+): gesture = <fingers>, <direction>, <action>
gesture = 3, horizontal, workspace
gesture = 3, swipe,      move
gesture = 3, pinch,      fullscreen
gesture = 4, horizontal, workspace

# =====================================================================
# Misc (end-4)
# =====================================================================
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vrr = 0
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    animate_manual_resizes = false
    animate_mouse_windowdragging = false
    enable_swallow = false
    allow_session_lock_restore = true
    initial_workspace_tracking = 0
    focus_on_activate = true
}

binds {
    scroll_event_delay = 0
    hide_special_on_workspace_change = true
}

cursor {
    zoom_factor = 1
    zoom_rigid = false
    hotspot_padding = 1
}

xwayland {
    force_zero_scaling = true
}

# =====================================================================
# Window rules — blur viene del bloque decoration (global), no hace falta
# regla por ventana. Con background_opacity en kitty alcanza.
# =====================================================================

# =====================================================================
# Keybinds
# =====================================================================

# Apps
bind = $mod, Return,       exec, $terminal
bind = $mod, T,            exec, $terminal
# Terminal flotante (kitty) — reglas inline porque windowrule tiene regresión en 0.55.2
bind = $mod SHIFT, Return, exec, hyprctl dispatch exec "[float; size 1000 620; center] $terminal --class kitty-float"

# Window switcher (Ambxst coverflow) — Super+Tab cicla forward, Super+Shift+Tab back
bind = $mod, Tab,        exec, echo windowswitcher > /tmp/ambxst_ipc.pipe
bind = $mod SHIFT, Tab,  exec, echo windowswitcher-prev > /tmp/ambxst_ipc.pipe

# Workspace switcher 3D cube (Ambxst) — Alt+Tab cicla forward, Alt+Shift+Tab back
bind = ALT, Tab,         exec, echo workspaceswitcher > /tmp/ambxst_ipc.pipe
bind = ALT SHIFT, Tab,   exec, echo workspaceswitcher-prev > /tmp/ambxst_ipc.pipe
bind = $mod, E,      exec, $files
bind = $mod, W,      exec, $browser
bind = $mod, C,      exec, $editor
bind = $mod, R,      exec, $launcher
# El botón del bar ahora abre el ControlPanel; el launcher de Ambxst queda en SUPER+D
bind = $mod, D,      exec, echo launcher > /tmp/ambxst_ipc.pipe

# Window focus (arrows + hjkl)
bind = $mod, Left,  movefocus, l
bind = $mod, Right, movefocus, r
bind = $mod, Up,    movefocus, u
bind = $mod, Down,  movefocus, d
bind = $mod, H,     movefocus, l
bind = $mod, L,     movefocus, r
bind = $mod, K,     movefocus, u
bind = $mod, J,     movefocus, d

# Window move
bind = $mod SHIFT, Left,  movewindow, l
bind = $mod SHIFT, Right, movewindow, r
bind = $mod SHIFT, Up,    movewindow, u
bind = $mod SHIFT, Down,  movewindow, d

# Window state
bind = $mod, Q,     killactive,
bind = $mod, F,     fullscreen, 0
bind = $mod SHIFT, F, fullscreen, 1
bind = $mod ALT, Space, togglefloating,
bind = $mod, P,     pin,

# Split ratio (layoutmsg envía el comando al layout activo)
binde = $mod, Semicolon,  layoutmsg, splitratio -0.1
binde = $mod, Apostrophe, layoutmsg, splitratio +0.1

# Workspaces 1-10
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Move window to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Cycle workspaces with scroll / page
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1
bind = $mod, Page_Down,  workspace, r+1
bind = $mod, Page_Up,    workspace, r-1

# Special workspace (scratchpad)
bind = $mod, S,        togglespecialworkspace, special
bind = $mod ALT, S,    movetoworkspace, special:special
bind = CTRL $mod, S,   togglespecialworkspace, special

# Drag / resize con mouse
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Audio
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+ -l 1.5
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,        exec, wpctl set-mute   @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute,     exec, wpctl set-mute   @DEFAULT_SOURCE@ toggle

# Media
bindl  = , XF86AudioPlay,  exec, playerctl play-pause
bindl  = , XF86AudioPause, exec, playerctl play-pause
bindl  = , XF86AudioNext,  exec, playerctl next
bindl  = , XF86AudioPrev,  exec, playerctl previous

# Brillo
bindel = , XF86MonBrightnessUp,   exec, brightnessctl s 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl s 5%-

# Screenshots
# SUPER/CTRL + SHIFT + S abren el widget de captura de Ambxst.
# Ruta absoluta: el exec de Hyprland no tiene ~/.local/bin en el PATH.
bind = $mod SHIFT,  S,     exec, /home/calvin/.local/bin/ambxst run screenshot
bind = CTRL SHIFT,  S,     exec, /home/calvin/.local/bin/ambxst run screenshot
# SUPER + SHIFT + W abre el selector de wallpapers (coverflow) de Ambxst.
bind = $mod SHIFT,  W,     exec, /home/calvin/.local/bin/ambxst run wallpaper-picker
# SUPER + SHIFT + P alterna el overlay de anotación/paint en vivo de Ambxst.
bind = $mod SHIFT,  P,     exec, /home/calvin/.local/bin/ambxst run paint
# Print sigue siendo captura rápida directa (monitor activo → portapapeles).
bind = ,            Print, exec, grim -o "$(hyprctl activeworkspace -j | jq -r '.monitor')" - | wl-copy
bind = CTRL,        Print, exec, mkdir -p ~/Pictures/Screenshots && grim ~/Pictures/Screenshots/Screenshot_$(date +%Y-%m-%d_%H.%M.%S).png

# Clipboard history (cliphist + fuzzel) — requiere `cliphist` (ver Autostart arriba)
# bind = $mod, V, exec, cliphist list | fuzzel --dmenu --match-mode fzf | cliphist decode | wl-copy

# Sesión
bind = $mod, M,                          exit,
bind = $mod ALT, L,                      exec, loginctl lock-session
bind = $mod SHIFT, L,                    exec, systemctl suspend
bind = CTRL SHIFT ALT $mod, Delete,      exec, systemctl poweroff

# =====================================================================
# OVERRIDES — agregá tus cosas debajo
# =====================================================================
