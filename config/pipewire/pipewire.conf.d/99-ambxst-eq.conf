# Ambxst EQ — ecualizador de 10 bandas nativo de PipeWire.
# Crea un sink virtual "Ambxst EQ" (ambxst_eq_sink). Las apps reproducen acá,
# pasa por 10 filtros biquad y sale al dispositivo real. Las ganancias se cambian
# en runtime con: pw-cli set-param <id ambxst_eq_sink> Props '{ params = [ "eq_band_N:Gain" <dB> ] }'
context.modules = [
    { name = libpipewire-module-filter-chain
        args = {
            node.description = "Ambxst EQ"
            media.name       = "Ambxst EQ"
            filter.graph = {
                nodes = [
                    { type = builtin name = eq_band_1  label = bq_lowshelf  control = { "Freq" = 31.0    "Q" = 0.7  "Gain" = 0.0 } }
                    { type = builtin name = eq_band_2  label = bq_peaking   control = { "Freq" = 63.0    "Q" = 1.41 "Gain" = 0.0 } }
                    { type = builtin name = eq_band_3  label = bq_peaking   control = { "Freq" = 125.0   "Q" = 1.41 "Gain" = 0.0 } }
                    { type = builtin name = eq_band_4  label = bq_peaking   control = { "Freq" = 250.0   "Q" = 1.41 "Gain" = 0.0 } }
                    { type = builtin name = eq_band_5  label = bq_peaking   control = { "Freq" = 500.0   "Q" = 1.41 "Gain" = 0.0 } }
                    { type = builtin name = eq_band_6  label = bq_peaking   control = { "Freq" = 1000.0  "Q" = 1.41 "Gain" = 0.0 } }
                    { type = builtin name = eq_band_7  label = bq_peaking   control = { "Freq" = 2000.0  "Q" = 1.41 "Gain" = 0.0 } }
                    { type = builtin name = eq_band_8  label = bq_peaking   control = { "Freq" = 4000.0  "Q" = 1.41 "Gain" = 0.0 } }
                    { type = builtin name = eq_band_9  label = bq_peaking   control = { "Freq" = 8000.0  "Q" = 1.41 "Gain" = 0.0 } }
                    { type = builtin name = eq_band_10 label = bq_highshelf control = { "Freq" = 16000.0 "Q" = 0.7  "Gain" = 0.0 } }
                ]
                links = [
                    { output = "eq_band_1:Out"  input = "eq_band_2:In" }
                    { output = "eq_band_2:Out"  input = "eq_band_3:In" }
                    { output = "eq_band_3:Out"  input = "eq_band_4:In" }
                    { output = "eq_band_4:Out"  input = "eq_band_5:In" }
                    { output = "eq_band_5:Out"  input = "eq_band_6:In" }
                    { output = "eq_band_6:Out"  input = "eq_band_7:In" }
                    { output = "eq_band_7:Out"  input = "eq_band_8:In" }
                    { output = "eq_band_8:Out"  input = "eq_band_9:In" }
                    { output = "eq_band_9:Out"  input = "eq_band_10:In" }
                ]
            }
            audio.channels = 2
            audio.position = [ FL FR ]
            capture.props = {
                node.name   = "ambxst_eq_sink"
                media.class = Audio/Sink
            }
            playback.props = {
                node.name    = "ambxst_eq_out"
                node.passive = true
            }
        }
    }
]
