[general]
bars = 20
framerate = 60
sensitivity = 200
autosens = 2

[smoothing]
# Lower = snappier / more jagged (brutal). Default ~0.77.
noise_reduction = 0.20

[input]
method = pipewire
source = auto

[output]
method = raw
raw_target = /dev/stdout
data_format = ascii
ascii_max_range = 100
bar_delimiter = 59
frame_delimiter = 10

[eq]
1 = 0.8
2 = 1.0
3 = 1.3
4 = 1.6
5 = 2.0
